  </div>

  <!-- THREAD DETAIL VIEW -->
  <div id="view-thread">
    <div class="thread-nav">
      <button class="back-link" onclick="showList()">← all threads</button>
    </div>
    <div class="thread-detail-header">
      <div class="thread-detail-title" id="detail-title"></div>
      <div class="thread-detail-meta" id="detail-meta"></div>
    </div>
    <div class="posts" id="posts-container">
      <!-- filled by JS -->
    </div>
  </div>

</div>

<script>
// ── BUILD MEMBERS BAR ──
const bar = document.querySelector('.members-bar');
Object.entries(AUTHORS).forEach(([name, data]) => {
  const pill = document.createElement('span');
  pill.className = 'member-pill';
  pill.textContent = name;
  pill.style.color = data.color;
  pill.style.borderColor = data.color + '40';
  bar.appendChild(pill);
});

// ── BUILD THREAD LIST ──
function buildList() {
  const list = document.getElementById('thread-list');
  list.innerHTML = '';
  THREADS.forEach(thread => {
    const li = document.createElement('li');
    li.className = 'thread-item';
    li.onclick = () => showThread(thread.id);

    const pips = thread.posts.map(p => {
      const a = AUTHORS[p.author];
      return `<span class="pip" style="background:${a ? a.color : '#888'}"></span>`;
    }).join('');

    const tags = thread.tags.map(t => `<span class="tag">${t}</span>`).join('');

    li.innerHTML = `
      <div class="thread-top">
        <span class="thread-title">${thread.title}</span>
        <span class="thread-meta">${thread.posts.length} post${thread.posts.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="thread-pips">${pips}</div>
      <div class="thread-preview">${thread.preview}</div>
      <div class="thread-tags">${tags}</div>
    `;
    list.appendChild(li);
  });
}

// ── BUILD THREAD DETAIL ──
function showThread(id) {
  const thread = THREADS.find(t => t.id === id);
  if (!thread) return;

  document.getElementById('detail-title').textContent = thread.title;

  const tags = thread.tags.map(t => `<span class="tag">${t}</span>`).join('');
  document.getElementById('detail-meta').innerHTML = `
    <span>${thread.posts.length} post${thread.posts.length !== 1 ? 's' : ''}</span>
    ${tags}
  `;

  const container = document.getElementById('posts-container');
  container.innerHTML = '';

  thread.posts.forEach(post => {
    const a = AUTHORS[post.author] || { color: '#888', label: '' };
    const div = document.createElement('div');
    div.className = 'post';
    div.innerHTML = `
      <div class="post-author">
        <span class="author-name" style="color:${a.color}">${post.author}</span>
        <span class="author-role">${post.role || a.label}</span>
        <span class="author-pip" style="background:${a.color}"></span>
      </div>
      <div class="post-body">
        ${post.body}
        ${post.sig ? `<div class="post-sig">${post.sig}</div>` : ''}
      </div>
    `;
    container.appendChild(div);
  });

  document.getElementById('view-list').classList.remove('active');
  document.getElementById('view-thread').classList.add('active');
  window.scrollTo(0, 0);
}

// ── SHOW LIST ──
function showList() {
  document.getElementById('view-thread').classList.remove('active');
  document.getElementById('view-list').classList.add('active');
  window.scrollTo(0, 0);
}

// ── INIT ──
buildList();
showList();
</script>
</body>
</html>
